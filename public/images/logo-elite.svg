  <!-- Text: REPAIR SERVICES -->
  <text x="100" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#5B8EC9">REPAIR SERVICES</text>
